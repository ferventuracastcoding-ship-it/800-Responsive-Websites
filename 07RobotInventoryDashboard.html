<!DOCTYPE html>
<html>
<head>

<title>AI Robotics Inventory Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",Arial;
}


body{
    background:#020617;
    color:white;
}


/* Layout */

.dashboard{

display:flex;
min-height:100vh;

}



/* Sidebar */


.sidebar{

width:250px;
background:#0f172a;
padding:25px;
}


.logo{

font-size:25px;
font-weight:bold;
color:#38bdf8;
margin-bottom:40px;

}


.menu p{

padding:15px;
background:#1e293b;
margin:10px 0;
border-radius:10px;

}



/* Main */

.main{

flex:1;
padding:25px;

}



header{

display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:15px;

}


header h1{

color:#38bdf8;

}



button{

background:#2563eb;
border:none;
padding:12px 20px;
color:white;
border-radius:10px;
cursor:pointer;

}


button:hover{

background:#0ea5e9;

}




/* Stats */


.stats{

display:grid;
grid-template-columns:
repeat(auto-fit,minmax(180px,1fr));

gap:20px;
margin:30px 0;

}


.stat{

background:#1e293b;
padding:25px;
border-radius:15px;
box-shadow:0 0 15px #000;

}


.stat h2{

color:#38bdf8;

}





/* Search */


input{

width:100%;
padding:15px;
border-radius:10px;
border:none;
margin-bottom:25px;

}





/* Robot Grid */


.robot-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));

gap:20px;

}



.robot{

background:#111827;
padding:20px;
border-radius:18px;
border:1px solid #334155;

}



.robot h2{

color:#7dd3fc;

}



.robot span{

font-size:40px;

}



.bar{

height:12px;
background:#334155;
border-radius:20px;
overflow:hidden;
margin:15px 0;

}



.progress{

height:100%;
background:#22c55e;

}



.warning .progress{

background:#eab308;

}


.offline .progress{

background:#ef4444;

}



.status{

padding:7px 15px;
border-radius:20px;
display:inline-block;

}


.active{

background:#16a34a;

}


.warning{

background:#ca8a04;

}


.off{

background:#dc2626;

}





/* Mobile */

@media(max-width:700px){


.dashboard{

display:block;

}


.sidebar{

width:100%;

}


.main{

padding:15px;

}



header{

flex-direction:column;
align-items:flex-start;

}



.robot-grid{

grid-template-columns:1fr;

}



}



</style>


</head>


<body>


<div class="dashboard">



<aside class="sidebar">


<div class="logo">

🤖 RoboCore AI

</div>


<div class="menu">

<p>🏠 Dashboard</p>

<p>🤖 Robots</p>

<p>📦 Inventory</p>

<p>🏭 Warehouses</p>

<p>⚙ Settings</p>


</div>


</aside>




<main class="main">


<header>

<div>

<h1>
Robotics Inventory Center
</h1>

<p>
Autonomous Fleet Management System
</p>

</div>


<button onclick="addRobot()">
+ Add Robot
</button>


</header>





<section class="stats">


<div class="stat">

<h2 id="total">
0
</h2>

<p>Total Robots</p>

</div>



<div class="stat">

<h2 id="active">
0
</h2>

<p>Active</p>

</div>




<div class="stat">

<h2 id="battery">
0%
</h2>

<p>Battery Level</p>

</div>




<div class="stat">

<h2 id="locations">
0
</h2>

<p>Facilities</p>

</div>



</section>





<input 
id="search"
placeholder="🔍 Search robots..."
onkeyup="searchRobot()">





<div class="robot-grid" id="robots">

</div>




</main>


</div>





<script>


let robots=[


{
name:"Atlas",
model:"Industrial Humanoid",
battery:92,
location:"Warehouse A",
status:"Active"
},


{
name:"Rover-X",
model:"Autonomous Vehicle",
battery:78,
location:"Mars Lab",
status:"Active"
},


{
name:"Titan",
model:"Heavy Loader",
battery:42,
location:"Factory B",
status:"Warning"
},


{
name:"Nova",
model:"AI Assistant",
battery:15,
location:"Warehouse C",
status:"Offline"
}


];





function render(){


let box=document.getElementById("robots");


box.innerHTML="";


robots.forEach(r=>{


let statusClass=
r.status=="Active"
?
"active"
:
r.status=="Warning"
?
"warning"
:
"off";


box.innerHTML+=`

<div class="robot">


<span>🤖</span>


<h2>${r.name}</h2>

<p>
${r.model}
</p>


<p>
📍 ${r.location}
</p>



<div class="bar">

<div class="progress"
style="width:${r.battery}%">

</div>

</div>


<p>
🔋 ${r.battery}%
</p>



<div class="status ${statusClass}">
${r.status}
</div>



</div>


`;


});


stats();


}





function stats(){


document.getElementById("total")
.innerHTML=robots.length;



document.getElementById("active")
.innerHTML=
robots.filter(r=>r.status=="Active").length;



let avg=
robots.reduce((a,b)=>a+b.battery,0)
/robots.length;


document.getElementById("battery")
.innerHTML=Math.floor(avg)+"%";



document.getElementById("locations")
.innerHTML=
new Set(
robots.map(r=>r.location)
).size;


}





function addRobot(){


robots.push({

name:"AI-Bot-"+robots.length,

model:"Warehouse Assistant",

battery:100,

location:"New Facility",

status:"Active"

});


render();


}





function searchRobot(){


let text=
document.getElementById("search")
.value.toLowerCase();



document.querySelectorAll(".robot")
.forEach(card=>{


card.style.display=
card.innerText.toLowerCase()
.includes(text)
?
"block"
:
"none";


});


}




render();


</script>


</body>
</html>
