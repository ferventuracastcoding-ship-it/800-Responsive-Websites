<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Binary Search 3D Lab</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Arial,sans-serif;
}


body{

background:#050816;
color:white;
overflow:hidden;

}



/* THREE.JS BACKGROUND */

#canvas{

position:fixed;

inset:0;

z-index:0;

}




/* TOP HEADER */

.header{

position:absolute;

top:25px;

left:50%;

transform:translateX(-50%);

z-index:100;

text-align:center;

background:
rgba(15,23,42,.8);

padding:20px 50px;

border-radius:25px;

border:1px solid #38bdf8;

backdrop-filter:blur(15px);

}



.header h1{

color:#38bdf8;

font-size:35px;

}




/* LEFT CONTROL PANEL */


.controls{

position:absolute;

top:30px;

left:30px;

z-index:200;


background:

rgba(15,23,42,.9);


padding:25px;

border-radius:20px;


border:1px solid #10b981;


box-shadow:

0 0 40px #10b98155;


}



.controls h2{

color:#10b981;

}



select,button{

width:220px;

margin-top:15px;

padding:12px;

border-radius:10px;

border:none;

font-size:16px;

}



button{

background:#38bdf8;

cursor:pointer;

}



button:hover{

background:#10b981;

}




/* STATUS PANEL */


.status{

position:absolute;

right:30px;

top:30px;


z-index:150;


background:

rgba(2,6,23,.85);


padding:25px;


width:280px;


border-radius:20px;


border:1px solid #a855f7;


}



.status h2{

color:#a855f7;

}




/* ALGORITHM CARDS */


.algorithms{


position:absolute;


bottom:30px;


left:50%;


transform:translateX(-50%);


z-index:120;


display:flex;


gap:15px;


flex-wrap:wrap;


justify-content:center;


width:90%;


}



.card{


background:

rgba(30,41,59,.85);


padding:15px;


border-radius:15px;


border:1px solid #334155;


transition:.3s;


}



.card:hover{


transform:translateY(-10px);


border-color:#38bdf8;


z-index:300;


}




</style>

</head>


<body>


<div id="canvas"></div>




<div class="header">

<h1>
Binary Search 3D Laboratory
</h1>

</div>




<div class="controls">


<h2>Search Algorithms</h2>


<select id="searchType">


<option value="standard">
Standard Search
</option>


<option value="first">
First Occurrence
</option>


<option value="last">
Last Occurrence
</option>


<option value="count">
Count Occurrences
</option>


<option value="insert">
Insert Position
</option>


<option value="closest">
Closest Value
</option>


<option value="rotated">
Rotated Search
</option>


</select>


<button onclick="startSearch()">
Run Algorithm
</button>


</div>





<div class="status">


<h2>Status</h2>

<p id="message">
Waiting...
</p>


</div>





<div class="algorithms">


<div class="card">
1. Standard O(log n)
</div>

<div class="card">
2. First Index
</div>

<div class="card">
3. Last Index
</div>

<div class="card">
4. Counting
</div>

<div class="card">
5. Insert Position
</div>

<div class="card">
6. Closest Value
</div>

<div class="card">
7. Rotated Array
</div>


</div>





<script type="module">


import * as THREE from
"https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js";



const container=
document.getElementById("canvas");



const scene=
new THREE.Scene();


scene.background=
new THREE.Color(0x050816);



const camera=
new THREE.PerspectiveCamera(
60,
innerWidth/innerHeight,
.1,
1000
);


camera.position.z=12;



const renderer=
new THREE.WebGLRenderer({
antialias:true
});


renderer.setSize(
innerWidth,
innerHeight
);


container.appendChild(
renderer.domElement
);





scene.add(
new THREE.AmbientLight(
0xffffff,
2
)
);





let values=[
3,7,12,18,25,31,42,55,64,78
];


let cubes=[];



function createBlocks(){


values.forEach((value,index)=>{


let geo=
new THREE.BoxGeometry(
.8,.8,.8
);



let mat=
new THREE.MeshStandardMaterial({

color:0x38bdf8

});



let cube=
new THREE.Mesh(
geo,
mat
);



cube.position.x=
(index-5)*1.3;


cube.userData.value=value;


scene.add(cube);


cubes.push(cube);



});


}



createBlocks();





function delay(ms){

return new Promise(
r=>setTimeout(r,ms)
);

}



async function mark(index,color){


cubes[index]
.material.color
.set(color);


await delay(800);


}





async function startSearch(){


let type=
document.getElementById(
"searchType"
).value;



cubes.forEach(c=>
c.material.color.set(
0x38bdf8
)
);



document.getElementById("message")
.innerHTML=
"Running: "+type;



let left=0;

let right=values.length-1;



while(left<=right){


let mid=
Math.floor(
(left+right)/2
);



await mark(
mid,
0xfacc15
);



if(values[mid]==42){


await mark(
mid,
0x22c55e
);


break;


}



if(values[mid]<42)

left=mid+1;


else

right=mid-1;



}



document.getElementById("message")
.innerHTML=
"Search Complete";


}






function animate(){


requestAnimationFrame(
animate
);



cubes.forEach((cube,i)=>{


cube.rotation.y+=.01;


cube.position.y=
Math.sin(
Date.now()*0.002+i
)*.05;



});


renderer.render(
scene,
camera
);



}


animate();




window.addEventListener(
"resize",
()=>{


camera.aspect=
innerWidth/innerHeight;


camera.updateProjectionMatrix();


renderer.setSize(
innerWidth,
innerHeight
);


});


window.startSearch=startSearch;



</script>


</body>
</html>
