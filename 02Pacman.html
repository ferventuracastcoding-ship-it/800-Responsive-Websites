<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Responsive Pac-Man</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#111;
font-family:Arial;
color:white;
display:flex;
flex-direction:column;
align-items:center;
}

h1{
margin:15px;
color:yellow;
}

#ui{
display:flex;
gap:10px;
margin-bottom:10px;
flex-wrap:wrap;
justify-content:center;
}

button{
padding:10px 20px;
font-size:16px;
cursor:pointer;
}

#score{
font-size:20px;
padding:10px;
}

#game{
display:grid;
grid-template-columns:repeat(15,1fr);
width:min(95vw,600px);
aspect-ratio:1;
background:#000;
border:4px solid blue;
}

.cell{
border:1px solid #111;
display:flex;
justify-content:center;
align-items:center;
font-size:1.5vw;
}

.wall{
background:#0022aa;
}

.dot::after{
content:"•";
color:white;
font-size:14px;
}

.player{
background:yellow;
border-radius:50%;
}

.ghost{
background:red;
border-radius:50%;
}

@media(max-width:600px){

.cell{
font-size:3vw;
}

}
</style>

</head>

<body>

<h1>Pac-Man</h1>

<div id="ui">

<div id="score">
Score: 0
</div>

<button id="start">
Start
</button>

<button id="stop">
Stop
</button>

</div>

<div id="game"></div>

<script>

const game=document.getElementById("game");

const rows=15;
const cols=15;

let score=0;

let running=false;

let player={
x:1,
y:1
};

let ghost={
x:13,
y:13
};

let board=[];

for(let y=0;y<rows;y++){

board[y]=[];

for(let x=0;x<cols;x++){

if(
x==0||
y==0||
x==cols-1||
y==rows-1||
(x%4==0&&y>2&&y<12)
){

board[y][x]=1;

}else{

board[y][x]=0;

}

}

}

function draw(){

game.innerHTML="";

let dots=0;

for(let y=0;y<rows;y++){

for(let x=0;x<cols;x++){

let cell=document.createElement("div");

cell.className="cell";

if(board[y][x]==1){

cell.classList.add("wall");

}

if(board[y][x]==0){

cell.classList.add("dot");

dots++;

}

if(player.x==x&&player.y==y){

cell.className="cell player";

}

if(ghost.x==x&&ghost.y==y){

cell.className="cell ghost";

}

game.appendChild(cell);

}

}

document.getElementById("score").innerHTML="Score: "+score;

if(dots==0){

alert("YOU WIN!");

running=false;

}

}

draw();

function move(dx,dy){

if(!running)return;

let nx=player.x+dx;
let ny=player.y+dy;

if(board[ny][nx]!=1){

player.x=nx;
player.y=ny;

if(board[ny][nx]==0){

board[ny][nx]=2;

score+=10;

}

}

check();

draw();

}

document.addEventListener("keydown",e=>{

if(e.key=="ArrowLeft"||e.key=="a")move(-1,0);

if(e.key=="ArrowRight"||e.key=="d")move(1,0);

if(e.key=="ArrowUp"||e.key=="w")move(0,-1);

if(e.key=="ArrowDown"||e.key=="s")move(0,1);

});

function ghostMove(){

if(!running)return;

const dirs=[
[1,0],
[-1,0],
[0,1],
[0,-1]
];

let options=[];

for(let d of dirs){

let nx=ghost.x+d[0];
let ny=ghost.y+d[1];

if(board[ny][nx]!=1){

options.push(d);

}

}

let r=options[Math.floor(Math.random()*options.length)];

ghost.x+=r[0];
ghost.y+=r[1];

check();

draw();

}

function check(){

if(player.x==ghost.x&&player.y==ghost.y){

alert("GAME OVER");

running=false;

}

}

let timer=setInterval(ghostMove,400);

document.getElementById("start").onclick=()=>{

running=true;

};

document.getElementById("stop").onclick=()=>{

running=false;

};

</script>

</body>
</html>
